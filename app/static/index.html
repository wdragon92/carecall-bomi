<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 어르신 접근성: 핀치 확대 허용 (입력 폰트 18px라 iOS 포커스 자동줌 없음). viewport-fit은 노치 세이프에어리어용 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>똑똑한 돌봄 친구 보미</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Tailwind CDN 실패해도 최소 레이아웃 유지 */
    html, body { height: 100%; margin: 0; }
    body { font-family: "Malgun Gothic", system-ui, sans-serif; font-size: 18px; background: #f6f7f9; color: #1f2937; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; } /* dvh 미지원 구형 브라우저 vh 폴백 */
    /* Tailwind CDN 실패 시 핵심 유틸 폴백 — 없으면 리포트 모달·파일입력·긴급배너가 그대로 노출된다.
       (!important지만 CDN 정상 시엔 아래 md:* 규칙이 뒤에서 다시 이겨 데스크톱 패널/탭 레이아웃 유지) */
    .hidden { display: none !important; }
    @media (min-width: 768px) {
      .md\:hidden { display: none !important; }
      .md\:flex { display: flex !important; }
    }
    .bubble { max-width: 85%; padding: 14px 16px; border-radius: 18px; line-height: 1.6; font-size: 19px; white-space: pre-wrap; word-break: break-word; }
    .bubble-ai { background: #fff; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
    .bubble-user { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    /* T2 정보 카드 — 수치·신청처는 이 말풍선에만 (RAG 근거·기준일 시각화) */
    .bubble-card { background: #eff6ff; border: 1.5px solid #2563eb; font-size: 16px; max-width: 92%; }
    .rag-card-title { font-weight: 700; font-size: 18px; }
    .rag-card-badge { font-size: 12px; color: #1d4ed8; background: #dbeafe; border-radius: 9999px; padding: 2px 10px; display: inline-block; margin: 6px 0 8px; }
    .rag-row { display: flex; gap: 8px; font-size: 15px; line-height: 1.5; margin-top: 3px; }
    .rag-row b { flex: 0 0 3em; color: #1e40af; font-weight: 600; }
    .rag-link { display: inline-flex; align-items: center; min-height: 48px; margin-top: 10px; background: #2563eb; color: #fff !important; border-radius: 10px; padding: 12px 16px; font-size: 15px; font-weight: 600; text-decoration: none; }
    .rag-link:active, .mview-btn:active, .btn:active { filter: brightness(.92); }
    .bubble-live { opacity: .7; font-style: italic; }
    #rag-chip { font-size: 17px; font-weight: 700; color: #1d4ed8; background: #dbeafe; border: 1.5px solid #93c5fd; border-radius: 9999px; padding: 8px 18px; display: inline-block; box-shadow: 0 2px 8px rgba(37,99,235,.15); }
    .fcat-items { list-style: none; margin: 4px 0 0; padding: 0; }
    .fcat-items li { font-size: 14px; color: #374151; margin-top: 2px; }
    .fcat-items li::before { content: "· "; color: #9ca3af; }
    .card { border-radius: 14px; padding: 12px 14px; border: 1px solid #e5e7eb; background: #fff; overflow-wrap: anywhere; word-break: break-word; }
    .fcat-items li { overflow-wrap: anywhere; word-break: break-word; }
    /* 상태 강조색 — Tailwind 유틸 순서 경합과 무관하게 항상 승리 */
    .btn-rec { background: #fecaca !important; }
    .btn-on { background: #dbeafe !important; }
    .sev-낮음 { border-left: 6px solid #16a34a; }
    .sev-보통 { border-left: 6px solid #d97706; }
    .sev-높음 { border-left: 6px solid #dc2626; }
    button { touch-action: manipulation; }
    .btn { min-height: 52px; min-width: 52px; border-radius: 14px; font-size: 18px; font-weight: 600; }
    .newcard { animation: pop .5s ease; }
    @keyframes pop { from { transform: scale(.96); background: #fef9c3; } to { transform: scale(1); } }
    .typing-dots i { display:inline-block; width:8px; height:8px; margin:0 2px; background:#9ca3af; border-radius:50%; animation: td 1.2s infinite ease-in-out both; }
    .typing-dots i:nth-child(1){ animation-delay:-.24s; }
    .typing-dots i:nth-child(2){ animation-delay:-.12s; }
    @keyframes td { 0%,80%,100%{ transform: scale(.6); opacity:.4; } 40%{ transform: scale(1); opacity:1; } }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    /* 모바일: 홈바(노치) 세이프에어리어 + 초소형 화면 헤더/버튼 최적화 */
    #mobile-tabs { padding-bottom: env(safe-area-inset-bottom); }
    a, button { -webkit-tap-highlight-color: transparent; }
    @media (max-width: 420px) {
      #app-title { font-size: 16px; }
      .btn { min-width: 48px; min-height: 48px; font-size: 16px; }
      #btn-voice, #btn-end { padding-left: 8px; padding-right: 8px; white-space: nowrap; }
      .bubble { max-width: 90%; font-size: 18px; }
      .bubble-card { max-width: 95%; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 헤더 -->
    <header class="flex items-center justify-between px-4 py-3 bg-white border-b shadow-sm">
      <div class="flex items-center gap-2 min-w-0">
        <span class="text-2xl shrink-0">🌼</span>
        <div class="min-w-0">
          <div id="app-title" class="font-bold text-lg leading-tight truncate">똑똑한 돌봄 친구 보미</div>
          <div id="mode-badge" class="text-xs text-gray-400 truncate">연결 중…</div>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button id="btn-voice" class="btn px-3 bg-gray-100 hover:bg-gray-200" aria-pressed="true" title="음성 켜기/끄기">🔊 음성</button>
        <button id="btn-end" class="btn px-3 bg-rose-100 text-rose-700 hover:bg-rose-200">이야기 마치기</button>
      </div>
    </header>

    <!-- 긴급 배너 -->
    <div id="urgent-banner" class="hidden bg-red-600 text-white text-center px-4 py-3 font-bold" role="alert"></div>

    <!-- 본문 -->
    <main class="flex-1 flex overflow-hidden">
      <!-- 채팅 영역 -->
      <section id="chat-pane" class="flex-1 flex flex-col min-w-0">
        <div id="chat-log" class="flex-1 overflow-y-auto px-4 py-4 space-y-3" aria-live="polite" aria-label="보미와의 대화"></div>
        <!-- RAG 검색 상태 -->
        <div id="rag-chip-wrap" class="hidden px-4 pb-1"><span id="rag-chip"></span></div>
        <!-- 입력바 -->
        <div class="border-t bg-white p-3">
          <div class="flex items-end gap-2">
            <button id="btn-mic" class="btn px-3 bg-gray-100 hover:bg-gray-200 shrink-0" title="눌러서 말하기 시작, 다시 눌러 전송" aria-pressed="false">🎤</button>
            <button id="btn-attach" class="btn px-3 bg-gray-100 hover:bg-gray-200 shrink-0" title="사진 첨부">📎</button>
            <input id="file-input" type="file" accept="image/*" class="hidden" />
            <textarea id="text-input" rows="1" placeholder="이곳에 입력하거나 🎤을 눌러 말씀하세요" enterkeyhint="send"
              class="flex-1 resize-none border rounded-2xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-400" style="max-height:120px;"></textarea>
            <button id="btn-send" class="btn px-4 bg-blue-600 text-white hover:bg-blue-700 shrink-0">보내기</button>
          </div>
          <div id="mic-hint" class="hidden text-center text-red-600 font-semibold mt-2">🔴 녹음 중… 말씀이 끝나면 🎤 버튼을 다시 눌러 주세요</div>
        </div>
      </section>

      <!-- 사이드 패널 — 돌봄 현황 한눈에 (탭 없이 전체 정보) -->
      <aside id="panel-pane" class="hidden md:flex w-full md:w-80 lg:w-96 flex-col border-l bg-gray-50">
        <div class="px-4 py-3 border-b bg-white font-bold">📋 돌봄 현황</div>
        <div class="flex-1 overflow-y-auto p-3 space-y-5">
          <section>
            <h3 class="text-xs font-bold text-gray-500 tracking-wide mb-2">관찰된 특이사항</h3>
            <div id="tab-findings" class="space-y-2">
              <p class="text-gray-400 text-center my-6 text-sm">대화가 진행되면<br>특이사항이 여기에 정리됩니다.</p>
            </div>
          </section>
          <section>
            <h3 class="text-xs font-bold text-gray-500 tracking-wide mb-2">복지 안내</h3>
            <div id="tab-welfare" class="space-y-2">
              <p class="text-gray-400 text-center my-6 text-sm">자격이 맞는 복지가<br>여기에 안내됩니다.</p>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <!-- 모바일 하단 탭 -->
    <nav id="mobile-tabs" class="md:hidden flex border-t bg-white">
      <button data-mview="chat" class="mview-btn flex-1 py-3 font-semibold text-blue-600">💬 대화</button>
      <button data-mview="panel" class="mview-btn flex-1 py-3 font-semibold text-gray-500">📋 기록 <span id="mobile-badge" class="hidden ml-1 text-xs bg-red-500 text-white rounded-full px-2">!</span></button>
    </nav>
  </div>

  <!-- 리포트 모달 -->
  <div id="report-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-6 relative">
      <button id="btn-close-report-x" class="btn absolute top-3 right-3 bg-gray-100 text-gray-600" aria-label="리포트 닫기">✕</button>
      <h2 class="text-2xl font-bold mb-1 pr-14">돌봄 요약 리포트</h2>
      <p class="text-xs text-gray-400 mb-4">※ 참고용이며 의학적 진단이 아닙니다.</p>
      <div id="report-body" class="space-y-4"></div>
      <button id="btn-close-report" class="btn w-full mt-6 bg-blue-600 text-white">닫기</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
